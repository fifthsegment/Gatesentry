name: Build a release

on:
  push:
    branches:
      - master
      - main
      - release-*

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.21

      - name: Build
        id: build
        run: |
          TAG=v$(awk -F'"' '/var GATESENTRY_VERSION =/ { print $2 }' main.go)
          mkdir bin
          go get -v
          ls -la
          cd ui && npm install && npm run build && cd ..
          ls
          rm -rf application/webserver/frontend/files/*
          mv ui/dist/* application/webserver/frontend/files
          mv application/webserver/frontend/files/fs/* application/webserver/frontend/files
          env GOOS=linux GOARCH=amd64 go build -o gatesentry-linux
          env GOOS=darwin GOARCH=amd64 go build -o gatesentry-macos
          env GOOS=windows GOARCH=amd64 go build -o gatesentry-windows.exe
          env GOOS=linux GOARCH=arm64 go build -o gatesentry-linux-arm64
          chmod +x gatesentry-linux
          chmod +x gatesentry-macos
          git config user.name "GitHub Action"
          git config user.email "fifthsegment@github.com"
          echo "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Setup Inno Setup
        run: |
          docker container create --name setup amake/innosetup installer.iss
          docker cp ./scripts/installer.iss setup:/work/
          docker cp ./gatesentry-windows.exe setup:/work/
          docker start -i -a setup
          docker cp setup:/work/Output/. .
          docker rm setup
      - name: Create Tag
        uses: cardinalby/git-tag-action@master
        env:
          TAG: ${{ steps.build.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          files: |
            gatesentry-linux
            gatesentry-macos
            gatesentry-windows.exe
            gatesentry-linux-arm64
            GatesentrySetup.exe

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: gatesentry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container and smoke test
        run: |
          docker run -d --rm --name gatesentry-test \
            -p 10786:10786 \
            -p 10413:10413 \
            -e GATESENTRY_DNS_PORT=10053 \
            gatesentry:latest

          echo "Waiting for server..."
          for i in $(seq 1 20); do
            if curl -s http://localhost:10786 > /tmp/smoke-response 2>/dev/null; then
              echo "Server healthy after ${i}s"
              break
            fi
            [ $i -eq 20 ] && echo "Server never became healthy" && docker logs gatesentry-test && exit 1
            sleep 1
          done

          if grep -q '<html' /tmp/smoke-response; then
            echo "Docker image serves UI correctly"
          else
            echo "UI response missing <html>"
            head -20 /tmp/smoke-response
            exit 1
          fi

          if curl -s --proxy http://localhost:10413 http://example.com -o /dev/null -w "%{http_code}" | grep -q 200; then
            echo "Proxy port 10413 working"
          else
            echo "Proxy test failed"
          fi

      - name: Cleanup
        if: always()
        run: docker stop gatesentry-test 2>/dev/null || true
