name: Go Test and Coverage

on:
  push:
    branches: ["master"]
    paths:
      - "**.go"
      - "ui/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "**.go"
      - "ui/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/test.yml"
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: pip install pytest dnspython requests

      - name: Run integration tests (Go + Python)
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
